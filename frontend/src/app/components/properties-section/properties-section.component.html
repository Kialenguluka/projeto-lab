<section class="container mx-auto px-4 py-8">
  <div class="mb-4 flex items-center justify-between">
    <div>
      <h2 class="text-xl font-bold text-foreground">{{ title }}</h2>
      @if (subtitle) {
        <p class="text-sm text-muted-foreground">{{ subtitle }}</p>
      }
    </div>
    @if (showLink) {
      <a [routerLink]="linkHref" class="text-sm font-medium text-primary hover:underline">{{ linkText }}</a>
    }
  </div>

  <div class="group relative">
    <div
      #scrollBox
      class="-mx-4 flex gap-4 overflow-x-auto px-4 pb-2 scrollbar-hide"
    >
      @for (p of properties; track p.id) {
        <div class="w-64 shrink-0">
          <app-property-card [property]="p" />
        </div>
      }
    </div>

    <button
      type="button"
      (click)="scroll('left')"
      class="absolute -left-4 top-1/2 hidden -translate-y-1/2 opacity-0 shadow-lg transition-opacity group-hover:opacity-100 md:inline-flex h-9 w-9 items-center justify-center rounded-md border bg-card"
      aria-label="Anterior"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <button
      type="button"
      (click)="scroll('right')"
      class="absolute right-0 top-1/2 z-10 hidden -translate-y-1/2 translate-x-4 opacity-0 shadow-lg transition-opacity group-hover:opacity-100 md:inline-flex h-9 w-9 items-center justify-center rounded-md border bg-card"
      aria-label="Seguinte"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>
</section>
