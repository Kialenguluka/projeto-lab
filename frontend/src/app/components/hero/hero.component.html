<section class="relative overflow-hidden bg-neutral-950 pb-40 pt-20 text-white">
  <!-- Background Images with Cross-fade -->
  <div class="absolute inset-0 z-0 overflow-hidden">
    @for (img of images; track img; let i = $index) {
      <img [src]="img" 
           alt="Background" 
           class="absolute inset-0 h-full w-full object-cover transition-opacity duration-1000 ease-in-out"
           [class.opacity-40]="i === currentImageIndex"
           [class.opacity-0]="i !== currentImageIndex"
           [class.scale-110]="i === currentImageIndex"
           [class.scale-100]="i !== currentImageIndex"
           style="transition-property: opacity, transform; transition-duration: 2000ms;" />
    }
    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-neutral-900/60 to-neutral-900"></div>
  </div>

  <div class="container relative z-10 mx-auto px-6">
    <div class="max-w-4xl animate-in fade-in slide-in-from-bottom-8 duration-1000">
      <h1 class="mb-6 text-5xl font-extrabold leading-[1.1] tracking-tight md:text-7xl lg:text-8xl">
        {{ t('heroTitle') }}
      </h1>
      <p class="max-w-xl text-lg font-medium text-neutral-300 md:text-xl">
        {{ t('heroSubtitle') }}
      </p>
    </div>

    <!-- Modern Search Bar (Glassmorphism) -->
    <div class="mt-12 animate-in fade-in slide-in-from-bottom-12 duration-1000 delay-200">
      <form (ngSubmit)="search()" 
            class="group relative flex w-full max-w-3xl items-center rounded-2xl border border-white/10 bg-white/5 p-2 backdrop-blur-xl transition-all hover:bg-white/10 hover:shadow-2xl">
        
        <div class="flex flex-1 items-center px-4">
          <svg class="h-6 w-6 text-primary transition-transform group-focus-within:scale-110" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
          <input
            type="search"
            [(ngModel)]="searchTerm"
            name="search"
            [placeholder]="t('searchPlaceholder')"
            class="ml-3 w-full bg-transparent py-4 text-base font-medium text-white outline-none placeholder:text-neutral-500 md:text-lg"
          />
        </div>

        <button type="submit" 
                class="inline-flex h-14 items-center justify-center rounded-xl bg-primary px-8 text-base font-bold text-white transition-all hover:scale-[1.02] hover:bg-primary-600 active:scale-95 shadow-lg shadow-primary/20">
          {{ t('search') }}
        </button>
      </form>
    </div>
  </div>
</section>
