<div
  [routerLink]="['/produto', product.id]"
  class="group block cursor-pointer"
>
  <div class="relative h-48 overflow-hidden rounded-lg bg-gray-100 dark:bg-gray-800">
    <img
      [src]="image"
      [alt]="name"
      class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
      loading="lazy"
    />
    <button
      type="button"
      (click)="toggleFavorite($event)"
      class="absolute right-2 top-2 inline-flex h-9 w-9 items-center justify-center rounded-full bg-white/90 dark:bg-gray-800/90 text-gray-600 dark:text-gray-300 shadow-sm hover:bg-white dark:hover:bg-gray-700 transition-colors"
      aria-label="Favorito"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        [class.fill-red-500]="isFavorite"
        [class.text-red-500]="isFavorite"
      >
        <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
      </svg>
    </button>
    
    @if (product.stock > 0) {
      <span class="absolute bottom-2 left-2 rounded-md bg-green-500 px-2 py-1 text-xs font-bold text-white">
        Em stock
      </span>
    } @else {
      <span class="absolute bottom-2 left-2 rounded-md bg-red-500 px-2 py-1 text-xs font-bold text-white">
        Esgotado
      </span>
    }

    @if (promotion) {
      <span class="absolute left-2 top-2 rounded-md bg-yellow-400 px-2 py-1 text-xs font-bold text-gray-900 shadow-sm">
        Promo
      </span>
    }
  </div>

  <div class="mt-3">
    <h3 class="line-clamp-1 font-bold text-gray-900 dark:text-white">{{ name }}</h3>
    @if (product.category_name) {
      <p class="line-clamp-1 text-xs text-primary uppercase font-medium mt-1">{{ product.category_name }}</p>
    }

    <p class="mt-2 text-sm flex items-end gap-2">
      @if (promotion) {
        <span class="text-xs text-gray-500 dark:text-gray-400 line-through">
          {{ exchangeRate.formatPrice(oldPrice) }}
        </span>
      }
      <span class="font-bold text-lg text-gray-900 dark:text-white">
        {{ exchangeRate.formatPrice(product.price) }}
      </span>
    </p>
  </div>
</div>
